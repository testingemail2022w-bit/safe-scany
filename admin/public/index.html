<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Scan — Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a1a;
            color: #f0eef6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            pointer-events: none;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(124,106,255,0.5), transparent 70%);
            top: -100px; right: -100px;
            animation: drift1 20s ease-in-out infinite;
        }
        .orb-2 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(93,228,199,0.3), transparent 70%);
            bottom: -80px; left: -80px;
            animation: drift2 25s ease-in-out infinite;
        }
        .orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,107,138,0.2), transparent 70%);
            top: 50%; left: 50%;
            animation: drift3 18s ease-in-out infinite;
        }
        @keyframes drift1 { 0%,100%{transform:translate3d(0,0,0) scale(1)} 50%{transform:translate3d(-50px,40px,0) scale(1.1)} }
        @keyframes drift2 { 0%,100%{transform:translate3d(0,0,0) scale(1)} 50%{transform:translate3d(60px,-40px,0) scale(1.15)} }
        @keyframes drift3 { 0%,100%{transform:translate3d(0,0,0) scale(1)} 50%{transform:translate3d(-40px,-50px,0) scale(0.9)} }

        /* Login Card */
        .login-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(124,106,255,0.25);
            border-radius: 22px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 30px rgba(124,106,255,0.1), inset 0 1px 0 rgba(255,255,255,0.18);
            animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Logo */
        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .logo {
            width: 80px; height: 80px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(124,106,255,0.2), rgba(93,228,199,0.1));
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .logo::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(124,106,255,0.1), transparent);
            animation: spin 8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .logo svg {
            width: 36px; height: 36px;
            color: #a594fd;
            position: relative;
            z-index: 1;
        }

        /* Title */
        .title {
            text-align: center;
            margin-bottom: 32px;
        }
        .title h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a594fd, #5de4c7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .title p {
            font-size: 0.875rem;
            color: rgba(240,238,246,0.5);
        }

        /* Error */
        .error-msg {
            background: rgba(255,107,138,0.1);
            border: 1px solid rgba(255,107,138,0.2);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #ff6b8a;
            text-align: center;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show { display: block; animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

        /* Form */
        .input-group {
            position: relative;
            margin-bottom: 16px;
        }
        .input-group > svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px; height: 18px;
            color: rgba(240,238,246,0.3);
            pointer-events: none;
        }
        .input-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px 16px 14px 44px;
            color: #f0eef6;
            font-size: 0.925rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            border-color: #7c6aff;
            box-shadow: 0 0 0 3px rgba(124,106,255,0.12), 0 0 20px rgba(124,106,255,0.15);
            background: rgba(255,255,255,0.08);
        }
        .input-group input::placeholder { color: rgba(240,238,246,0.3); }

        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(240,238,246,0.3);
            cursor: pointer;
            padding: 4px;
        }
        .toggle-pw:hover { color: rgba(240,238,246,0.7); }

        /* Options row */
        .options-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            font-size: 0.85rem;
        }
        .options-row label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(240,238,246,0.5);
            cursor: pointer;
        }
        .options-row a {
            color: #a594fd;
            text-decoration: none;
        }
        .options-row a:hover { color: #7c6aff; }

        /* Button */
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #7c6aff, #6349e0);
            border: 1px solid rgba(124,106,255,0.4);
            border-radius: 12px;
            padding: 14px 24px;
            color: white;
            font-size: 0.925rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(124,106,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(124,106,255,0.45);
        }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-login .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }
        .btn-login.loading .spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.75rem;
            color: rgba(240,238,246,0.25);
        }
    </style>
</head>
<body>
    <!-- Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Login Card -->
    <div class="login-card">
        <div class="logo-wrap">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
        </div>

        <div class="title">
            <h1>Safe Scan</h1>
            <p>Admin Dashboard</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm">
            <div class="input-group">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" id="username" placeholder="Username" required autocomplete="username">
            </div>

            <div class="input-group">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                <button type="button" class="toggle-pw" onclick="togglePassword()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>

            <div class="options-row">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <div class="spinner"></div>
                <span class="btn-text">Sign In</span>
            </button>
        </form>

        <p class="footer">Safe Scan Admin v3.0 — Secure Access</p>
    </div>

    <script>
        const API = (function() {
            if (window.location.origin.startsWith('file:')) return 'http://localhost:3001';
            const host = window.location.hostname;
            if (host !== 'localhost' && host !== '127.0.0.1') return window.location.origin;
            if (window.location.port !== '3001') return `http://${host}:3001`;
            return window.location.origin;
        })();

        // Check if already logged in
        if (localStorage.getItem('safescan_token')) {
            window.location.href = '/admin/dashboard.html';
        }

        function togglePassword() {
            const pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('errorMsg');

            btn.classList.add('loading');
            btn.disabled = true;
            errorEl.classList.remove('show');

            try {
                let res;
                try {
                    res = await fetch(API + '/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: document.getElementById('username').value,
                            password: document.getElementById('password').value
                        })
                    });
                } catch (networkErr) {
                    throw new Error('Cannot connect to server. Make sure the admin server is running on port 3001.');
                }

                let data;
                try {
                    data = await res.json();
                } catch (parseErr) {
                    throw new Error('Server returned an invalid response. Please try again.');
                }

                if (!res.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                localStorage.setItem('safescan_token', data.token);
                localStorage.setItem('safescan_admin', JSON.stringify(data.admin));
                window.location.href = '/admin/dashboard.html';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.add('show');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
